server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Don't advertise the nginx version (Server header / error pages).
  server_tokens off;

  # --- Security headers (sent on every response, incl. errors: `always`) ------
  # The bundle ships a single same-origin <script>, so script-src 'self' is safe
  # (no inline scripts: vite-plugin-pwa is injectRegister:false). style-src keeps
  # 'unsafe-inline' because React / emoji-picker set inline style attributes.
  # connect-src is intentionally scheme-broad: the API server address is chosen
  # at runtime on the login screen (any host, http/https, ws/wss). img/media
  # allow data:/blob: (avatars, favicon) and https: (GIF search, remote media).
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data: blob: https:; media-src 'self' data: blob: https:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; worker-src 'self'; manifest-src 'self'; connect-src 'self' http: https: ws: wss:" always;

  location / {
    try_files $uri /index.html;
  }
}
