services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chatpass
      POSTGRES_DB: chat
    ports:
      - "5433:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat -d chat"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://chat:chatpass@db:5432/chat?schema=public
      JWT_SECRET: change-me-in-prod
      MESSAGE_ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      UPLOAD_DIR: /data/uploads
      PORT: "4000"
      CORS_ORIGIN: "*"
    ports:
      - "4000:4000"
    volumes:
      - uploads-data:/data/uploads

  web:
    build:
      context: ./web
      args:
        VITE_API_URL: ${VITE_API_URL:-http://172.16.2.192:4000}
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:80"

volumes:
  db-data:
  uploads-data:
