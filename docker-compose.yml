services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      mail:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      MESSAGE_ENCRYPTION_KEY: ${MESSAGE_ENCRYPTION_KEY}
      UPLOAD_DIR: /data/uploads
      # VAPID keys for Web Push (PWA). On first start, the server generates and
      # persists them here; the volume mount survives container restarts so
      # subscriptions don't break. Override via VAPID_PUBLIC_KEY/PRIVATE_KEY env.
      VAPID_FILE: /data/meta/vapid.json
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@murgat-chat.local}
      PORT: "4000"
      CORS_ORIGIN: "*"
      # Par défaut on cible le Mailpit du compose (dev). Pour basculer sur Brevo
      # (ou tout autre SMTP), surchargez ces variables dans .env — voir .env.example.
      SMTP_HOST: ${SMTP_HOST:-mail}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_REQUIRE_TLS: ${SMTP_REQUIRE_TLS:-false}
      MAIL_FROM: ${MAIL_FROM:-Chat <no-reply@murgat-chat.local>}
      APP_URL: ${APP_URL:-http://localhost:5173}
      # Version annoncée aux clients (GET /version) pour la bannière de MAJ.
      CLIENT_VERSION: ${CLIENT_VERSION:-}
      DOWNLOAD_URL: ${DOWNLOAD_URL:-https://github.com/claude-murgat/murgatchat/releases/latest}
      # Sélecteur de GIF (GIPHY) : clé d'API serveur (vide = fonctionnalité off) +
      # filtre de contenu (g / pg / pg-13 / r). Voir .env.example.
      GIPHY_API_KEY: ${GIPHY_API_KEY:-}
      GIF_RATING: ${GIF_RATING:-pg-13}
      # Pont signalements → issue GitHub (déclenche les workflows Claude). Token vide
      # = pont off (le signalement reste en base, aucune issue créée). Voir .env.example.
      GITHUB_BUG_TOKEN: ${GITHUB_BUG_TOKEN:-}
      GITHUB_REPO_OWNER: ${GITHUB_REPO_OWNER:-claude-murgat}
      GITHUB_REPO_NAME: ${GITHUB_REPO_NAME:-murgatchat}
      # Conversation de support in-app (Claude raffine le ticket avant l'issue).
      # Clé vide = chat off (le bouton « Signaler » retombe sur l'envoi direct).
      # Voir .env.example.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SUPPORT_MODEL: ${SUPPORT_MODEL:-claude-opus-4-8}
    ports:
      - "4000:4000"
    volumes:
      - uploads-data:/data/uploads
      # Server-side state outside of Postgres: VAPID keys, anything else we
      # need to keep across container restarts that isn't user-uploaded.
      - server-meta:/data/meta

  # Mail-catcher: invitation emails land here. UI at http://localhost:8025.
  mail:
    image: axllent/mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"

  web:
    build:
      context: ./web
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:80"

volumes:
  db-data:
  uploads-data:
  server-meta:
