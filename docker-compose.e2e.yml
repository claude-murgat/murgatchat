# Isolated stack for end-to-end tests so they NEVER touch the dev database
# (dev Postgres is on host port 5433 with a persistent volume). This stack uses
# its own ephemeral (tmpfs) DB and separate ports.
#
# Usage:
#   docker compose -f docker-compose.e2e.yml up -d --build
#   E2E_BASE_URL=http://localhost:5174 npm --prefix e2e test
#   docker compose -f docker-compose.e2e.yml down -v
services:
  db-e2e:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: e2e
      POSTGRES_PASSWORD: e2e
      POSTGRES_DB: e2e
    ports:
      - "5435:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U e2e -d e2e"]
      interval: 5s
      timeout: 5s
      retries: 10

  server-e2e:
    build: ./server
    depends_on:
      db-e2e:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://e2e:e2e@db-e2e:5432/e2e?schema=public
      JWT_SECRET: e2e-secret
      MESSAGE_ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      UPLOAD_DIR: /data/uploads
      PORT: "4000"
      CORS_ORIGIN: "*"
      # Enables the POST /test/reset endpoint so each e2e spec starts from a
      # virgin DB (avoids contending for the one-time admin bootstrap).
      E2E_TEST_MODE: "1"
    ports:
      - "4001:4000"

  web-e2e:
    build:
      context: ./web
      args:
        VITE_API_URL: http://localhost:4001
    depends_on:
      - server-e2e
    ports:
      - "5174:8080"
