name: desktop-installer

# Manually build ONLY the Windows desktop installer (Tauri / MSVC) and upload it
# as a downloadable artifact — no release, no tag, no APK. Use it to hotfix the
# installer attached to an existing release: dispatch this, download the artifact,
# then replace the asset on the release by hand.
#
# Runs against whatever ref you dispatch it on (default: main). Version comes from
# the committed files (web/src-tauri/tauri.conf.json), so the asset is named after
# the current version, e.g. Chat_0.5.5_x64-setup.exe.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  desktop:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: web/src-tauri
      - run: npm ci
        working-directory: web
      # VITE_API_URL is deliberately NOT set -> the installer ships with NO baked
      # server (web/src/api.js prod default is ""), exactly like the release build.
      # Without tagName/releaseId, tauri-action only builds (no upload to a release).
      - uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          # createUpdaterArtifacts=true → the build signs the installer, so the
          # signing key must be present even for this test build.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: web
          args: --bundles nsis
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: desktop-installer
          path: web/src-tauri/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error
          retention-days: 7
