# Étape finale du pipeline : revue IA de la PR.
# Déclenché quand un humain pose le label « revue-ia » sur une Pull Request —
# c.-à-d. APRÈS sa propre première relecture. Cela matérialise le « revue par un
# humain au début, puis par une IA » : la revue humaine reste la porte d'entrée,
# Claude apporte une seconde paire d'yeux automatique. Claude poste une revue
# (commentaire) mais NE merge JAMAIS et N'APPROUVE PAS : le merge en prod reste
# une décision humaine.
#
# Auth : claude_code_oauth_token (accès modèle) + github_token = PAT (GH_BOT_TOKEN)
# ayant l'écriture sur le dépôt, pour pouvoir commenter la PR.
name: claude-review

on:
  pull_request:
    types: [labeled]

permissions:
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  review:
    # Ne réagit qu'au label de demande de revue IA, posé par un humain.
    if: github.event.label.name == 'revue-ia'
    runs-on: ubuntu-latest
    # Marge large : une revue qui explore le code peut enchaîner beaucoup de tours
    # (cf. plafond relevé plus bas). Le temps de job reste la borne de sécurité.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: anthropics/claude-code-action@6c0083bb7289c31716797a039b6367b3079cc46e # v1
        id: claude
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GH_BOT_TOKEN }}
          prompt: |
            Tu effectues une revue de code de la Pull Request #${{ github.event.pull_request.number }}
            de MurgaChat (dépôt ${{ github.repository }}). Travaille et rédige en français.

            1. Récupère le diff de la PR (`gh pr diff ${{ github.event.pull_request.number }}`) et
               lis le code concerné dans le dépôt pour le contexte.
            2. Concentre-toi sur : bugs de correction, régressions, cas limites non gérés, problèmes
               de sécurité, et cohérence avec le style du dépôt (JavaScript ESM, pas de TypeScript ;
               conventions existantes ; tests Vitest dans server/ et Playwright dans e2e/).
            3. Poste UNE revue synthétique en commentaire (`gh pr comment ${{ github.event.pull_request.number }}`)
               structurée ainsi : « Bilan » (1-2 phrases), « Points bloquants » (le cas échéant),
               « Suggestions » (améliorations non bloquantes). Pour chaque point, cite le fichier et
               la ligne. Si rien de bloquant, dis-le clairement.
            4. N'APPROUVE PAS et NE MERGE PAS la PR, n'effectue aucune action destructrice : ta sortie
               est une revue consultative. La validation finale et le merge restent humains.
            5. RÈGLE IMPORTANTE — pas de @mention : n'écris JAMAIS « @ » suivi d'un identifiant dans
               ton commentaire. Un pseudo (issue/PR/code) peut coïncider avec un vrai compte GitHub
               hors équipe et le notifier à tort. Cite les pseudos en texte brut, sans « @ ».
          # Plafond de tours relevé drastiquement : la revue échouait en
          # « error_max_turns » avant d'avoir fini d'explorer le diff + le code.
          # On laisse beaucoup de marge ; la vraie borne est le timeout du job.
          claude_args: |
            --max-turns 200
            --model claude-opus-4-8

      # Rend lisible, dans les logs du job, le déroulé de la revue (messages +
      # appels d'outils + résultats + résultat final), à partir de l'execution_file
      # exposé par l'action. Best-effort : le script sort toujours 0, ne casse jamais
      # le job. (cf. issue #126 — on évite tout déversement de JSON brut.)
      - name: Transcription lisible de Claude
        if: always()
        run: .github/scripts/format-claude-log.sh "${{ steps.claude.outputs.execution_file }}"
