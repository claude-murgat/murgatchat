name: release

# Push a tag like v0.6.2 → run the full test suite, then build the Windows
# desktop installer (Tauri/MSVC) and publish it to a GitHub Release. Version
# comes from the tag. Mobile is PWA-only now — no APK is built here.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the Release and upload assets

jobs:
  # Reuse the existing suite (backend Vitest + e2e Playwright) as a gate.
  test:
    uses: ./.github/workflows/tests.yml

  # Create ONE draft Release for the tag; the build job attaches its asset.
  release:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      id: ${{ steps.create.outputs.id }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      # Fail fast if the committed version files disagree with the tag. These
      # files are the source of truth, bumped before tagging. (Mobile is now
      # PWA-only — mobile/package.json + mobile/app.json are no longer built or
      # validated here.)
      - name: Validate versions match the tag
        shell: bash
        run: |
          V="${{ steps.ver.outputs.version }}"
          fail=0
          chk() { [ "$2" = "$V" ] || { echo "::error::$1 = '$2', expected '$V'"; fail=1; }; }
          chk "web/package.json"             "$(jq -r .version web/package.json)"
          chk "tauri.conf.json"              "$(jq -r .version web/src-tauri/tauri.conf.json)"
          chk "Cargo.toml" "$(grep -m1 '^version *= *"' web/src-tauri/Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          [ "$fail" = 0 ] || { echo "Bump the 3 web/desktop version files to $V before tagging."; exit 1; }
      - id: create
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: true
          generate_release_notes: true

  # Windows installer via the official Tauri action (MSVC toolchain).
  desktop:
    needs: [test, release]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: web/src-tauri
      - run: npm ci
        working-directory: web
      # NOTE: VITE_API_URL is deliberately NOT set → the desktop build ships
      # with NO baked server (web/src/api.js prod default is ""). tauri-action
      # runs beforeBuildCommand (npm run build), bundles the NSIS installer, and
      # uploads Chat_<version>_x64-setup.exe to the draft release.
      - uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing: with createUpdaterArtifacts=true, Tauri signs the
          # installer and tauri-action generates + uploads latest.json (the
          # updater endpoint). These secrets MUST be set in the repo.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: web
          args: --bundles nsis
          tagName: ${{ github.ref_name }}
          releaseId: ${{ needs.release.outputs.id }}

  # Flip the draft to a published release once the installer is attached.
  publish:
    needs: [desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
