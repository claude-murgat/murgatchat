name: tests

on:
  pull_request:
  # No `push` trigger: a PR's checks already validate the code, so re-running the
  # full suite on push to main after a merge is redundant. release.yml still calls
  # this (workflow_call) as a gate before building/publishing a release.
  workflow_call:

jobs:
  backend:
    name: backend (vitest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: murgattest
          POSTGRES_PASSWORD: murgattest
          POSTGRES_DB: murgattest
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U murgattest -d murgattest"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      # Setting TEST_DATABASE_URL makes globalSetup use this service DB instead
      # of spinning up its own Docker container.
      TEST_DATABASE_URL: postgresql://murgattest:murgattest@localhost:5432/murgattest?schema=public
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm test

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Start isolated stack
        run: docker compose -f docker-compose.e2e.yml up -d --build
      - name: Wait for stack
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:4001/health && curl -sf http://localhost:5174 >/dev/null; then
              echo "stack ready"; exit 0
            fi
            sleep 2
          done
          echo "stack did not become ready"; docker compose -f docker-compose.e2e.yml logs; exit 1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: e2e/package-lock.json
      - run: npm ci
        working-directory: e2e
      - run: npx playwright install --with-deps chromium
        working-directory: e2e
      - run: npm test
        working-directory: e2e
        env:
          E2E_BASE_URL: http://localhost:5174
          CI: "true"
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7

  lint:
    name: lint (eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            web/package-lock.json
      - name: Lint server
        working-directory: server
        run: |
          npm ci
          npm run lint
      - name: Lint web
        working-directory: web
        run: |
          npm ci
          npm run lint

  sast:
    name: sast (semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install semgrep
      # Full scan → SARIF artifact (all severities), never fails on its own.
      - name: Semgrep scan (report)
        continue-on-error: true
        run: >-
          semgrep scan --metrics=off --sarif --output=semgrep.sarif
          --config=p/javascript --config=p/react --config=p/nodejs
          --config=p/expressjs --config=p/secrets --config=p/owasp-top-ten
      - name: Upload SARIF report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          retention-days: 7
      # Gate: fail the build only on high-severity (ERROR) findings.
      - name: Gate on high-severity findings
        run: >-
          semgrep scan --metrics=off --error --severity=ERROR -q
          --config=p/javascript --config=p/react --config=p/nodejs
          --config=p/expressjs --config=p/secrets --config=p/owasp-top-ten

  dast:
    name: dast (zap baseline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Start isolated stack
        run: docker compose -f docker-compose.e2e.yml up -d --build
      - name: Wait for stack
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:4001/health && curl -sf http://localhost:5174 >/dev/null; then
              echo "stack ready"; exit 0
            fi
            sleep 2
          done
          echo "stack did not become ready"; docker compose -f docker-compose.e2e.yml logs; exit 1
      # ZAP runs in its own container with --network host so it can reach the
      # stack published on the runner's localhost. Passive baseline scan only.
      # Fails (non-zero) on any WARN/FAIL alert not downgraded in .zap/rules.tsv.
      - name: ZAP baseline scan
        run: |
          mkdir -p zap-out && chmod 777 zap-out
          docker run --network host -v "${{ github.workspace }}:/zap/wrk/:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://localhost:5174 \
            -c .zap/rules.tsv \
            -r zap-out/report.html -w zap-out/report.md -J zap-out/report.json
      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: zap-baseline-report
          path: zap-out
          retention-days: 7
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v
