name: tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: backend (vitest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: murgattest
          POSTGRES_PASSWORD: murgattest
          POSTGRES_DB: murgattest
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U murgattest -d murgattest"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      # Setting TEST_DATABASE_URL makes globalSetup use this service DB instead
      # of spinning up its own Docker container.
      TEST_DATABASE_URL: postgresql://murgattest:murgattest@localhost:5432/murgattest?schema=public
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm test

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start isolated stack
        run: docker compose -f docker-compose.e2e.yml up -d --build
      - name: Wait for stack
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:4001/health && curl -sf http://localhost:5174 >/dev/null; then
              echo "stack ready"; exit 0
            fi
            sleep 2
          done
          echo "stack did not become ready"; docker compose -f docker-compose.e2e.yml logs; exit 1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: e2e/package-lock.json
      - run: npm ci
        working-directory: e2e
      - run: npx playwright install --with-deps chromium
        working-directory: e2e
      - run: npm test
        working-directory: e2e
        env:
          E2E_BASE_URL: http://localhost:5174
          CI: "true"
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7
