# Étape de DÉVELOPPEMENT du pipeline de signalement (sur runner LOCAL).
# L'issue est créée déjà triée par le Claude in-app (server/src/anthropic.js +
# github.js) avec le label « à-valider ». Ce workflow se déclenche quand un humain
# valide en posant le tag « claude:fix » sur l'issue. Claude implémente alors un
# correctif sur une branche et OUVRE une vraie PR, puis notifie l'équipe
# directement dans le chat MurgaChat.
#
# Pourquoi un runner LOCAL (self-hosted) : le développement tourne sur ta
# machine de dev (là où l'app + le chat tournent), ce qui permet à l'étape de
# notification de joindre le serveur sur http://localhost:4000. Enregistre un
# runner self-hosted avec le label « murgatchat » (Settings → Actions → Runners),
# avec git, Node/Bun, gh, jq et curl disponibles. Voir README.
#
# NB : l'action ne crée PAS de PR toute seule (elle pousse une branche et fournit
# un lien). On demande donc explicitement `gh pr create`. La PR, ouverte via le PAT
# (secret GH_BOT_TOKEN), déclenche la CI tests.yml. Laisser la PR en attente de revue
# humaine — c'est la seule porte de validation du pipeline.
name: claude-fix

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: claude-fix-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  fix:
    if: github.event.label.name == 'claude:fix'
    runs-on: [self-hosted, murgatchat]
    timeout-minutes: 30
    steps:
      # claude-code-action installe Bun via setup-bun, qui télécharge un .zip et exige
      # la commande `unzip` ; sans elle → « bun: command not found » / exit 127. On
      # garantit donc sa présence ici (best-effort, non destructif : on n'installe que
      # si elle manque). À défaut de sudo sans mot de passe / apt-get, on échoue avec
      # un message clair — installe alors `unzip` toi-même sur le runner.
      - name: Prérequis runner (unzip pour setup-bun)
        run: |
          if command -v unzip >/dev/null 2>&1; then
            echo "✓ unzip déjà présent"; exit 0
          fi
          echo "unzip absent — tentative d'installation…"
          if command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
            sudo apt-get update && sudo apt-get install -y unzip
          elif command -v apt-get >/dev/null 2>&1; then
            apt-get update && apt-get install -y unzip
          else
            echo "::error::unzip introuvable et installation auto impossible (sudo sans mot de passe ou apt-get requis). Installe-le sur le runner : sudo apt-get install -y unzip"
            exit 1
          fi
          command -v unzip >/dev/null 2>&1 && echo "✓ unzip installé"

      # C'est l'action — pas Claude — qui récupère le dernier code avant de remonter
      # les conteneurs. Par défaut actions/checkout fige le SHA de l'événement
      # (« labeled »), qui peut être en retard si main a avancé entre-temps. On force
      # donc la POINTE de main pour bâtir le chat (et brancher le fix) sur le code à jour.
      - uses: actions/checkout@v4
        with:
          ref: main

      # Le checkout tourne avec `clean: true` (défaut) → `git clean -ffdx` efface
      # tous les fichiers untracked ET gitignorés du workspace, dont le .env. On
      # garde donc le .env de référence HORS du workspace, sur la machine du
      # runner, et on le copie ici avant de démarrer le chat. Crée-le une fois :
      #   mkdir -p ~/murgatchat-secrets && cp .env.example ~/murgatchat-secrets/.env
      #   # édite les vraies valeurs, puis : chmod 600 ~/murgatchat-secrets/.env
      # Surcharge l'emplacement via la variable de dépôt RUNNER_ENV_FILE si besoin.
      - name: Injecter le .env (persistant hors workspace)
        run: |
          ENV_SRC="${{ vars.RUNNER_ENV_FILE || '~/murgatchat-secrets/.env' }}"
          ENV_SRC="${ENV_SRC/#\~/$HOME}"
          if [ ! -f "$ENV_SRC" ]; then
            echo "::error::.env introuvable à '$ENV_SRC'. Crée-le sur le runner (voir commentaire ci-dessus)."
            exit 1
          fi
          cp "$ENV_SRC" .env
          echo "✓ .env injecté depuis $ENV_SRC"

      # Le serveur n'est pas forcément déjà démarré sur la machine du runner. On
      # (re)démarre le chat avec le code à jour AVANT de coder, pour que Claude
      # puisse reproduire/tester contre l'app et que l'étape de notification finale
      # joigne le serveur sur http://localhost:4000.
      # Prérequis machine : Docker + docker compose. Le .env est injecté juste au-dessus.
      - name: Démarrer le chat en local
        run: docker compose up -d --build

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GH_BOT_TOKEN }}
          prompt: |
            Implémente un correctif pour l'issue #${{ github.event.issue.number }} de MurgaChat
            (dépôt ${{ github.repository }}). Travaille et rédige en français.

            L'application tourne en local (API http://localhost:4000, web http://localhost:5173) :
            utilise-la pour reproduire le bug et valider ton correctif quand c'est pertinent.

            1. Lis l'issue (rapport structuré + labels posés à la création par le Claude in-app) et le code concerné.
            2. Crée une branche `claude/fix-issue-${{ github.event.issue.number }}`.
            3. Applique le correctif MINIMAL et cohérent avec le style du dépôt
               (JavaScript ESM, pas de TypeScript ; conventions existantes).
            4. Ajoute ou ajuste un test si pertinent (Vitest dans server/ ; Playwright dans e2e/).
            5. Commit, puis pousse la branche.
            6. OUVRE une Pull Request vers `main` avec `gh pr create` : titre explicite, et corps
               en français décrivant le diagnostic et le correctif, terminé par une ligne
               « Fixes #${{ github.event.issue.number }} » pour lier et clore l'issue au merge.
            7. N'effectue AUCUNE action destructrice et ne fusionne pas : la PR doit rester en
               attente de revue humaine.
          # claude-code-action n'autorise par défaut que les outils natifs
          # (Read/Grep/Glob/Edit/Write) — PAS les commandes Bash. Or coder ici exige
          # git, gh (pr create), npm/npx (tests) et curl. Sans cet --allowedTools,
          # ces commandes sont refusées et le run meurt en « error_max_turns ».
          claude_args: |
            --max-turns 30
            --model claude-sonnet-4-6
            --allowedTools "Read,Grep,Glob,Edit,Write,Bash(git:*),Bash(gh:*),Bash(npm:*),Bash(npx:*),Bash(node:*),Bash(curl:*),Bash(jq:*)"

      # Notifie l'équipe dans le chat MurgaChat dès que la PR est ouverte. Best-effort :
      # n'échoue jamais le job (la PR existe déjà). Requiert le secret SUPPORT_NOTIFY_TOKEN
      # (partagé avec le serveur) et, optionnellement, la variable CHAT_NOTIFY_URL
      # (défaut http://localhost:4000, joignable car runner local).
      - name: Notifier MurgaChat
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_BOT_TOKEN }}
          NOTIFY_TOKEN: ${{ secrets.SUPPORT_NOTIFY_TOKEN }}
          CHAT_NOTIFY_URL: ${{ vars.CHAT_NOTIFY_URL || 'http://localhost:4000' }}
          ISSUE: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$NOTIFY_TOKEN" ]; then echo "SUPPORT_NOTIFY_TOKEN absent → pas de notif"; exit 0; fi
          PR_URL=$(gh pr list --repo "$REPO" --head "claude/fix-issue-$ISSUE" --state open --json url --jq '.[0].url // ""')
          if [ -z "$PR_URL" ]; then echo "Aucune PR ouverte trouvée → pas de notif"; exit 0; fi
          TITLE=$(gh issue view "$ISSUE" --repo "$REPO" --json title --jq '.title')
          PAYLOAD=$(jq -n --argjson n "$ISSUE" --arg u "$PR_URL" --arg t "$TITLE" \
            '{issueNumber:$n, prUrl:$u, title:$t}')
          curl -fsS -X POST "$CHAT_NOTIFY_URL/support/notify" \
            -H "Authorization: Bearer $NOTIFY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            && echo "Chat notifié : $PR_URL" \
            || echo "Notif chat échouée (non bloquant)"
